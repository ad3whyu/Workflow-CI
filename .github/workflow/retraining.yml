name: Model Retraining CI

# Pemicu: Berjalan setiap ada push ke branch main di folder Workflow-CI
on:
  push:
    branches:
      - main
    paths:
      - "Workflow-CI/MLProject/modelling.py"
  workflow_dispatch: # Memungkinkan kamu menjalankan manual dari tab Actions

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn matplotlib seaborn

      - name: Run MLflow Project (Retraining)
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN}}
        run: |
          cd Workflow-CI/MLProject
          # Menjalankan MLflow Project menggunakan entry point 'main'
          mlflow run . -P n_estimators=120 -P max_depth=15
